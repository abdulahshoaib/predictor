name: Question
description: Ask a question about the project.
title: "[Question]: "
labels:
  - question

body:
  - type: input
    id: summary
    attributes:
      label: Question
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Provide any context that will help answer your question.
    validations:
      required: true
