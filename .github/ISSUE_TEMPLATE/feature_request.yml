name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion!

  - type: input
    id: summary
    attributes:
      label: Feature Summary
      placeholder: Add dark mode...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your idea.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, references, screenshots, etc.
